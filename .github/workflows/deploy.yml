name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # needed for OIDC if you later switch to role-based auth
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to AWS (SST → CloudFront)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Determine SST stage
        id: stage
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with SST
        id: deploy
        run: |
          # SST prints outputs (including CloudFrontUrl) to stdout on success.
          npx sst deploy --stage "${{ steps.stage.outputs.name }}" 2>&1 | tee /tmp/sst-out.txt

          # Extract CloudFront URL from SST output.
          CF_URL=$(grep -oE 'https://[a-z0-9]+\.cloudfront\.net' /tmp/sst-out.txt | head -1)

          echo "cloudfront_url=${CF_URL}" >> "$GITHUB_OUTPUT"

          # Surface prominently in the Actions summary.
          echo "## Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **CloudFront URL** | ${CF_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Stage** | ${{ steps.stage.outputs.name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Also print as a workflow notice so it's visible at the top of the run.
      - name: Announce CloudFront URL
        run: |
          echo "::notice title=CloudFront URL::${{ steps.deploy.outputs.cloudfront_url }}"

      # Comment the preview URL on pull requests.
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.cloudfront_url }}'
            const stage = '${{ steps.stage.outputs.name }}'
            const sha = context.sha.slice(0, 7)
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '### Preview deployment ready',
                '',
                `**CloudFront URL:** ${url}`,
                `**Stage:** \`${stage}\``,
                `**Commit:** \`${sha}\``,
                '',
                '*First deploy takes ~15 min for CloudFront to propagate. Subsequent deploys are 3–5 min.*'
              ].join('\n')
            })

  # Tear down PR preview environments when the PR closes.
  teardown:
    name: Tear down PR stage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Remove PR stage
        run: npx sst remove --stage "pr-${{ github.event.pull_request.number }}"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
